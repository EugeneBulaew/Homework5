<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy</title>
    <style>
      
      *{
        box-sizing: border-box;
      }
      
      .container {
          height: 700px;
          width: 700px;
          background-color: green;
          padding: 50px;
      }

      .box1 {
          width: 100%;
          height: 75%;
          padding-bottom: calc(100/3);
          background-color: black;
      }

      .box2 {
          width: 50%;
          height: 25%;
          background-color: red;
          border: 40px solid purple;
      }
	</style>
</head>
<body>
    <div class="container">
	<div class="box1">
		<div class="box2"></div>
	</div>
</body>
</html>
